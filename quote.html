

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote</title>

     <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 350px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    #quote {
      margin-top: 20px;
      font-size: 18px;
      color: black;
    }
  </style>
</head>
<body>

    <div class="card">

        <h2>Quote generator</h2>

        <button onclick="quote()">NewQuote</button>

        <div id="quote">
            
        
        </div>
        
    
    </div>
</body>

<script src="quotegen.js">


</script>
</html>
